name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate portfolio data
        run: npm run pipeline:validate

      - name: Build with SvelteKit
        run: npm run build

      - name: Check bundle budget
        run: npm run pipeline:bundle-budget

      - name: Check visual contract
        run: npm run pipeline:visual-contract

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy build
            --project-name ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch main
